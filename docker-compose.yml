version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: corporate_events_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nest_user
      POSTGRES_PASSWORD: nest_password
      POSTGRES_DB: corporate_events
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: